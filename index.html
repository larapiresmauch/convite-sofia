<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <title>Convite Sofia 15</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Allura&family=Cormorant+Garamond:wght@400;500;600;700&family=Montserrat:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <main class="stage" aria-live="polite">
    <section class="envelope-screen" id="envelopeScreen" aria-label="Envelope do convite">
      <div class="envelope" aria-hidden="true">
        <div class="envelope-half envelope-half-left"></div>
        <div class="envelope-half envelope-half-right"></div>
        <div class="envelope-fold"></div>
      </div>

      <button class="seal-button" id="openInvite" type="button" aria-label="Abrir convite">
        <img src="img/monograma-transparente.png" alt="Selo com monograma Sofia 15">
      </button>

      <p class="tap-hint">Toque no selo para abrir</p>
    </section>

    <section class="invite-screen" id="inviteScreen" aria-label="Convite de aniversário da Sofia">
      <article class="invite-card">
        <header class="invite-heading">
          <h1>Sofia</h1>
          <p class="age">15 anos</p>
        </header>

        <section class="date-block" aria-label="Data e horario">
          <div class="date-side">
            <span>Sabado</span>
            <span>as 19:30</span>
          </div>
          <strong>15</strong>
          <div class="date-side">
            <span>Agosto</span>
            <span>2026</span>
          </div>
        </section>

        <section class="venue" aria-label="Local do evento">
          <h2>Salão Fun House</h2>
          <p>Rua Barão do Rio Branco, 1062, Vila São José</p>
        </section>

        <nav class="invite-actions" aria-label="Acoes do convite">
          <a class="round-action" href="https://share.google/JxBbEjsDQTiSoX5Iv" target="_blank" rel="noopener">
            <span class="action-icon">
              <img src="img/localizacao.png" alt="" aria-hidden="true">
            </span>
            <strong>Localização!</strong>
          </a>

          <a class="round-action" href="https://wa.me/5519996246689?text=Ol%C3%A1%2C%20confirmo%20minha%20presen%C3%A7a%20no%20anivers%C3%A1rio%20da%20Sofia%21" target="_blank" rel="noopener">
            <span class="action-icon">
              <img src="img/calendario.png" alt="" aria-hidden="true">
            </span>
            <strong>Confirme sua presença!</strong>
          </a>
        </nav>
      </article>
    </section>
  </main>

  <script src="js/script.js"></script>
</body>
</html>
